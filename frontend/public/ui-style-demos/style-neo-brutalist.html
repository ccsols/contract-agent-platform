<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新粗野主义 · UI 风格预览</title>
    <style>
      :root {
        --bg: #fffef6;
        --ink: #0b0b0b;
        --yellow: #ffe94a;
        --pink: #ff6bd6;
        --blue: #4dabff;
        --shadow: 6px 6px 0 var(--ink);
        --shadow-sm: 4px 4px 0 var(--ink);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: repeating-linear-gradient(
            0deg,
            rgba(11, 11, 11, 0.06) 0px,
            rgba(11, 11, 11, 0.06) 1px,
            transparent 1px,
            transparent 10px
          ),
          var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: clamp(18px, 4vw, 34px) clamp(16px, 4vw, 28px) 56px;
      }
      .top {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
        padding: 10px 12px;
        border: 3px solid var(--ink);
        background: var(--yellow);
        box-shadow: var(--shadow-sm);
      }
      .badge span {
        width: 10px;
        height: 10px;
        border: 3px solid var(--ink);
        background: #fff;
      }
      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .nav a {
        text-decoration: none;
        color: var(--ink);
        font-weight: 800;
        font-size: 13px;
        padding: 10px 12px;
        border: 3px solid var(--ink);
        background: #fff;
        box-shadow: var(--shadow-sm);
      }
      .nav a:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }
      .hero {
        border: 4px solid var(--ink);
        background: #fff;
        box-shadow: var(--shadow);
        padding: clamp(18px, 4vw, 28px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 6vw, 58px);
        line-height: 0.98;
        letter-spacing: -0.04em;
        font-weight: 900;
        text-transform: uppercase;
      }
      .sub {
        margin: 0 0 18px;
        font-size: 16px;
        line-height: 1.55;
        max-width: 62ch;
        font-weight: 600;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: stretch;
      }
      .btn {
        border: 3px solid var(--ink);
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        font-size: 13px;
        padding: 12px 14px;
        cursor: pointer;
        box-shadow: var(--shadow-sm);
      }
      .btn:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 var(--ink);
      }
      .btn-a {
        background: var(--pink);
        color: var(--ink);
      }
      .btn-b {
        background: var(--blue);
        color: var(--ink);
      }
      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        border: 3px solid var(--ink);
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 16px;
        min-height: 150px;
      }
      .card:nth-child(2) {
        background: var(--yellow);
      }
      .card:nth-child(3) {
        background: #e7ffd8;
      }
      .card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: -0.01em;
        text-transform: uppercase;
      }
      .card p {
        margin: 0;
        font-size: 14px;
        line-height: 1.55;
        font-weight: 600;
      }
      .note {
        margin-top: 16px;
        border: 3px dashed var(--ink);
        padding: 14px;
        background: #fff;
        font-weight: 700;
        line-height: 1.5;
      }
      .back {
        margin-top: 16px;
        font-weight: 800;
      }
      .back a {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="badge"><span aria-hidden="true"></span> Neo-brutal UI</div>
        <nav class="nav" aria-label="主导航">
          <a href="#">合同</a>
          <a href="#">风险</a>
          <a href="#">团队</a>
        </nav>
      </div>
      <main class="hero">
        <h1>把审查流程做得像海报一样好记</h1>
        <p class="sub">
          新粗野主义用硬边、硬阴影与高对比色块制造记忆点：非常适合营销落地页、活动站、或希望产品在竞品里“跳”出来的场景。注意正文仍要保持可读性，别把一切都 uppercase。
        </p>
        <div class="row">
          <button class="btn btn-a" type="button">立即开始</button>
          <button class="btn btn-b" type="button">看样例合同</button>
        </div>
        <section class="grid" aria-label="特性卡片">
          <article class="card">
            <h2>强边框</h2>
            <p>组件边界清晰，状态变化用位移阴影表达，而不是模糊的 glow。</p>
          </article>
          <article class="card">
            <h2>色块分区</h2>
            <p>用大面积纯色区分模块；黑色线条统一“手绘印刷”质感。</p>
          </article>
          <article class="card">
            <h2>态度文案</h2>
            <p>标题可以更大胆；但表格、条款正文建议回到更中性的排版。</p>
          </article>
        </section>
        <div class="note">提示：这一风格很吃一致性——圆角、阴影步长、边框粗细最好全局统一，否则容易变“乱”。</div>
        <p class="back"><a href="./index.html">← 返回风格索引</a></p>
      </main>
    </div>
  </body>
</html>
